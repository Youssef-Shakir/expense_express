<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#grad1)"/>
  <!-- Receipt/Document icon -->
  <rect x="25" y="15" width="50" height="60" rx="4" fill="white"/>
  <!-- Lines on receipt -->
  <rect x="32" y="25" width="36" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="32" y="35" width="28" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="32" y="45" width="32" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="32" y="55" width="24" height="4" rx="2" fill="#e5e7eb"/>
  <!-- Lightning bolt for "Express" -->
  <polygon points="55,70 48,82 54,82 50,95 62,80 55,80 60,70" fill="#fbbf24"/>
</svg>
